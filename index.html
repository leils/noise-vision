<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ghost-message — frame viewer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      color: #ccc;
      font-family: 'Courier New', monospace;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    #canvas {
      max-width: 100vw;
      max-height: calc(100vh - 60px);
      object-fit: contain;
      display: block;
    }

    #hud {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 24px;
      background: rgba(0,0,0,0.7);
      font-size: 13px;
      letter-spacing: 0.05em;
      user-select: none;
    }

    #hud .label { color: #666; }
    #hud .value { color: #eee; min-width: 5ch; text-align: right; }

    #scrubber {
      -webkit-appearance: none;
      appearance: none;
      width: 340px;
      height: 3px;
      background: #333;
      outline: none;
      cursor: pointer;
    }
    #scrubber::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #fff;
      cursor: pointer;
    }
    #scrubber::-moz-range-thumb {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #fff;
      border: none;
      cursor: pointer;
    }

    #prompt {
      position: fixed;
      top: 40px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 40px;
      color: #ddd;
      letter-spacing: 0.03em;
      pointer-events: none;
      white-space: nowrap;
    }

    #hint {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.6);
      padding: 6px 14px;
      border-radius: 4px;
      font-size: 12px;
      color: #666;
      pointer-events: none;
      transition: opacity 0.5s;
    }

    #loading {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: #555;
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>

  <div id="loading">loading video…</div>
  <canvas id="canvas"></canvas>

  <div id="hud">
    <span class="label">frame</span>
    <span class="value" id="frameNum">—</span>
    <span class="label">/</span>
    <span class="value" id="totalFrames">—</span>
    <input type="range" id="scrubber" min="0" value="0" />
    <span class="label" id="timecode">00:00.000</span>
  </div>

  <div id="prompt">What do you see? Press ← → to see the next frame.</div>
  <!-- <div id="hint">← → to step frames &nbsp;·&nbsp; drag scrubber to seek</div> -->

  <!-- hidden video used as frame source -->
  <video id="video" src="ghost-message.mp4" preload="auto" muted playsinline
         style="display:none; position:absolute; pointer-events:none;"></video>

  <script>
    const video    = document.getElementById('video');
    const canvas   = document.getElementById('canvas');
    const ctx      = canvas.getContext('2d');
    const scrubber = document.getElementById('scrubber');
    const frameNum = document.getElementById('frameNum');
    const totalEl  = document.getElementById('totalFrames');
    const timecode = document.getElementById('timecode');
    const loading  = document.getElementById('loading');
    const hint     = document.getElementById('hint');

    const FPS = 30;
    let totalFrames = 0;
    let currentFrame = 0;
    let pendingFrame = null; // queued seek target while a seek is in flight
    let isSeeking = false;
    let ready = false;

    setTimeout(() => { hint.style.opacity = '0'; }, 4000);

    function formatTimecode(secs) {
      const m = Math.floor(secs / 60);
      const s = secs % 60;
      return `${String(m).padStart(2,'0')}:${s.toFixed(3).padStart(6,'0')}`;
    }

    function drawCurrentFrame() {
      if (canvas.width !== video.videoWidth || canvas.height !== video.videoHeight) {
        canvas.width  = video.videoWidth;
        canvas.height = video.videoHeight;
      }
      ctx.drawImage(video, 0, 0);
    }

    function updateHUD() {
      frameNum.textContent = String(currentFrame + 1).padStart(4, ' ');
      totalEl.textContent  = String(totalFrames).padStart(4, ' ');
      timecode.textContent = formatTimecode(video.currentTime);
      scrubber.value = currentFrame;
    }

    // requestVideoFrameCallback fires after the browser has actually decoded
    // and composited the new frame into the video element — unlike 'seeked',
    // which fires when currentTime is set but before pixels are ready.
    const hasRVFC = typeof video.requestVideoFrameCallback === 'function';

    function afterFrameReady(callback) {
      if (hasRVFC) {
        video.requestVideoFrameCallback(callback);
      } else {
        // Fallback: wait for seeked, then yield to the paint cycle
        video.addEventListener('seeked', function onSeeked() {
          video.removeEventListener('seeked', onSeeked);
          requestAnimationFrame(callback);
        });
      }
    }

    function doSeek(f) {
      isSeeking = true;
      afterFrameReady(() => {
        drawCurrentFrame();
        updateHUD();

        if (pendingFrame !== null) {
          const next = pendingFrame;
          pendingFrame = null;
          doSeek(next);
        } else {
          isSeeking = false;
        }
      });
      // Land at the midpoint of the frame's time window
      video.currentTime = (f + 0.5) / FPS;
    }

    function seekToFrame(f) {
      if (!ready) return;
      f = Math.max(0, Math.min(totalFrames - 1, f));
      currentFrame = f;

      if (isSeeking) {
        pendingFrame = f;
        return;
      }
      doSeek(f);
    }

    function onReady() {
      if (ready) return;
      ready = true;
      loading.style.display = 'none';
      totalFrames = Math.round(video.duration * FPS);
      scrubber.max = totalFrames - 1;
      canvas.width  = video.videoWidth;
      canvas.height = video.videoHeight;
      updateHUD();
      doSeek(0);
    }

    video.addEventListener('loadedmetadata', onReady);
    video.addEventListener('loadeddata', onReady);
    video.addEventListener('canplay', onReady);

    // Keyboard navigation
    document.addEventListener('keydown', (e) => {
      switch (e.key) {
        case 'ArrowRight': e.preventDefault(); seekToFrame(currentFrame + 1);  break;
        case 'ArrowLeft':  e.preventDefault(); seekToFrame(currentFrame - 1);  break;
        case 'ArrowUp':    e.preventDefault(); seekToFrame(currentFrame + 10); break;
        case 'ArrowDown':  e.preventDefault(); seekToFrame(currentFrame - 10); break;
        case 'Home':       e.preventDefault(); seekToFrame(0);                 break;
        case 'End':        e.preventDefault(); seekToFrame(totalFrames - 1);   break;
      }
    });

    scrubber.addEventListener('input', () => {
      seekToFrame(parseInt(scrubber.value, 10));
    });

    video.load();
  </script>
</body>
</html>
